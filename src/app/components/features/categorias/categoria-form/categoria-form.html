<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card text-primary text-center">
        <div class="card-header">
          <h2 class="card-title">{{ titulo }}</h2>
        </div>
        <div class="card-body">
          <form #miForm="ngForm" (ngSubmit)="guardar()" novalidate>
            <!-- Nombre de Categoría -->
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre de la Categoría</label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                class="form-control text-center text-primary"
                [(ngModel)]="categoria.nombre"
                #nombreRef="ngModel"
                required
                maxlength="50"
                placeholder="Ej: Electrónica"
                [ngClass]="{'is-invalid': nombreRef.invalid && (nombreRef.dirty || nombreRef.touched)}"
              />
              <div class="invalid-feedback">El nombre de la categoría es obligatorio.</div>
            </div>

            <!-- Descripción de Categoría -->
            <div class="mb-3">
              <label for="descripcion" class="form-label">Descripción</label>
              <textarea
                id="descripcion"
                name="descripcion"
                class="form-control text-center text-primary"
                [(ngModel)]="categoria.descripcion"
                #descripcionRef="ngModel"
                required
                maxlength="250"
                rows="3"
                placeholder="Ej: Artículos de electrónica"
                [ngClass]="{'is-invalid': descripcionRef.invalid && (descripcionRef.dirty || descripcionRef.touched)}"
              ></textarea>
              <div class="invalid-feedback">La descripción es obligatoria.</div>
            </div>

            <!-- Botones de Acción -->
            <div class="mb-3 text-center">
              <button type="submit" class="btn btn-outline-primary me-2" [disabled]="miForm.invalid">
                Guardar
              </button>
              <a routerLink="/listaDeCategorias" class="btn btn-outline-danger">
                Cancelar
              </a>
            </div>
          </form>
        </div>
        <div class="card-footer text-info">
          {{ categoria.idCategoria ? 'Editando categoría ID: ' + categoria.idCategoria : 'Nueva categoría' }}
        </div>
      </div>
    </div>
  </div>
</div>
